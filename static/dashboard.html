<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snappic · Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121216;
    --card:#1b1b21;
    --card-hover:#212129;
    --border:#2a2a32;
    --text:#f2f0ea;
    --muted:#8a8a94;
    --flash:#f5c518;
    --pulse:#ff3d81;
    --teal:#4fd1c5;
    --blue:#7c9eff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Space Grotesk',sans-serif;}

  #particles{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    display:block;
  }

  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 32px;
    border-bottom:1px solid var(--border);
    position:sticky;
    top:0;
    background:rgba(18,18,22,0.9);
    backdrop-filter:blur(8px);
    z-index:10;
  }
  .header-left{
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .wordmark{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.02em;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .wordmark .tag{
    font-family:'JetBrains Mono',monospace;
    font-weight:400;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.08em;
  }
  .tagline{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.02em;
    opacity:1;
    transition:opacity 0.4s ease;
    min-height:14px;
  }
  .tagline.fade{opacity:0;}
  .status{
    display:flex;
    align-items:center;
    gap:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    color:var(--muted);
  }
  .header-center{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
  }
  .header-center *{
    position:static !important;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--muted);
  }
  .dot.live{
    background:var(--pulse);
    box-shadow:0 0 0 0 rgba(255,61,129,0.6);
    animation:pulse 1.8s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,61,129,0.5);}
    70%{box-shadow:0 0 0 8px rgba(255,61,129,0);}
    100%{box-shadow:0 0 0 0 rgba(255,61,129,0);}
  }

  main{max-width:1180px;margin:0 auto;padding:28px 32px 100px;position:relative;z-index:1;}

  .stats{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:14px;
    margin-bottom:28px;
  }
  .stat-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 18px;
  }
  .stat-card .label{
    font-size:11px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.06em;
    margin-bottom:8px;
  }
  .stat-card .value{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:28px;
    line-height:1;
  }
  .stat-card .sub{
    margin-top:6px;
    font-size:11px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
  }
  .stat-card.accent-flash .value{color:var(--flash);}
  .stat-card.accent-teal .value{color:var(--teal);}
  .stat-card.accent-blue .value{color:var(--blue);}
  .stat-card.accent-pulse .value{color:var(--pulse);}

  .tabs{
    display:flex;
    gap:6px;
    margin-bottom:18px;
    border-bottom:1px solid var(--border);
  }
  .tab{
    background:none;
    border:none;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.04em;
    padding:10px 4px;
    margin-right:18px;
    cursor:pointer;
    border-bottom:2px solid transparent;
    text-transform:uppercase;
  }
  .tab.active{color:var(--text);border-bottom-color:var(--flash);}

  .filters{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-end;
    gap:16px;
    margin-bottom:16px;
  }
  .filter-group{
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .filter-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--muted);
  }
  .filter-row{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .select{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    padding:7px 10px;
    border-radius:6px;
    cursor:pointer;
    max-width:220px;
  }
  .select:focus{outline:none;border-color:var(--flash);}
  .icon-btn{
    background:none;
    border:1px solid var(--border);
    color:var(--muted);
    width:28px;height:28px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    line-height:1;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .icon-btn:hover{color:var(--text);border-color:#3a3a44;}
  .btn{
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.03em;
    padding:8px 14px;
    border-radius:6px;
    cursor:pointer;
    text-transform:uppercase;
    white-space:nowrap;
  }
  .btn:hover{border-color:var(--flash);color:var(--flash);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}

  .feed{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    position:relative;
    transition:border-color 0.2s;
  }
  .card:hover{border-color:#3a3a44;}
  .card .thumb{
    width:100%;
    aspect-ratio:4/3;
    object-fit:cover;
    display:block;
    background:#000;
  }
  .card .thumb-placeholder{
    width:100%;
    aspect-ratio:4/3;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#17171c;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
  }
  .card .body{padding:12px 14px;}
  .badge{
    display:inline-block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:3px 7px;
    border-radius:4px;
    margin-bottom:8px;
  }
  .badge.session{background:rgba(245,197,24,0.15);color:var(--flash);}
  .badge.share{background:rgba(79,209,197,0.15);color:var(--teal);}
  .badge.survey{background:rgba(124,158,255,0.15);color:var(--blue);}
  .badge.competition_win{background:rgba(255,61,129,0.15);color:var(--pulse);}

  .card .summary{
    font-size:13px;
    line-height:1.4;
    color:var(--text);
    margin-bottom:8px;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card .time{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
  }
  .card a.site-link{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    text-decoration:none;
    border-bottom:1px dotted var(--muted);
  }
  .card a.site-link:hover{color:var(--text);}

  .flash-overlay{
    position:absolute;
    inset:0;
    background:#fff;
    opacity:0;
    pointer-events:none;
  }
  .card.new .flash-overlay{
    animation:flash 0.6s ease-out;
  }
  @keyframes flash{
    0%{opacity:0.85;}
    100%{opacity:0;}
  }
  .card.new{
    animation:rise 0.4s ease-out;
  }
  @keyframes rise{
    from{transform:translateY(8px);opacity:0;}
    to{transform:translateY(0);opacity:1;}
  }

  .empty{
    grid-column:1/-1;
    text-align:center;
    padding:60px 20px;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
  }

  .survey-list{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .survey-card{
    display:flex;
    gap:0;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    overflow:hidden;
  }
  .survey-card .thumb-wrap{
    width:170px;
    flex-shrink:0;
    background:#000;
  }
  .survey-card .thumb-wrap .thumb{
    width:170px;
    height:100%;
    min-height:130px;
    object-fit:cover;
    display:block;
  }
  .survey-card .thumb-wrap .thumb-placeholder{
    width:170px;
    height:100%;
    min-height:130px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    text-align:center;
    padding:8px;
  }
  .survey-card .content{
    padding:14px 16px;
    flex:1;
    min-width:0;
  }
  .survey-card .meta-line{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--muted);
    margin-bottom:10px;
  }
  .survey-fields{
    width:100%;
    border-collapse:collapse;
  }
  .survey-fields tr + tr td{border-top:1px solid var(--border);}
  .survey-fields td{
    padding:6px 10px 6px 0;
    font-size:12.5px;
    vertical-align:top;
  }
  .survey-fields td.field-title{
    color:var(--muted);
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    white-space:nowrap;
    width:1%;
  }
  .survey-fields td.field-value{color:var(--text);}

  #confettiCanvas{
    position:fixed;
    inset:0;
    z-index:50;
    pointer-events:none;
  }

  .ticker{
    position:fixed;
    left:0;right:0;bottom:0;
    height:34px;
    background:rgba(20,20,25,0.92);
    border-top:1px solid var(--border);
    backdrop-filter:blur(6px);
    overflow:hidden;
    z-index:20;
    display:flex;
    align-items:center;
  }
  .ticker-track{
    display:inline-block;
    white-space:nowrap;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--muted);
    letter-spacing:0.03em;
    padding-left:16px;
    transform:translateX(100%);
    animation:ticker-scroll 20s linear infinite;
  }
  @keyframes ticker-scroll{
    from{transform:translateX(100%);}
    to{transform:translateX(-100%);}
  }
  .ticker-track .seg{margin-right:36px;}
  .ticker-track .seg .badge-dot{
    display:inline-block;
    width:6px;height:6px;
    border-radius:50%;
    margin-right:6px;
  }

  @media (prefers-reduced-motion: reduce){
    .ticker-track{animation:none !important; transform:translateX(0) !important;}
    .card.new{animation:none !important;}
    .card.new .flash-overlay{animation:none !important;}
    .tagline{transition:none !important;}
  }

  @media (max-width:900px){
    .stats{grid-template-columns:repeat(2,1fr);}
  }
  @media (max-width:700px){
    .header-center{transform:translate(-50%,-50%) scale(0.8);}
  }
  @media (max-width:600px){
    header{padding:16px 18px;}
    main{padding:20px 18px 90px;}
    .stats{grid-template-columns:1fr 1fr;}
    .survey-card{flex-direction:column;}
    .survey-card .thumb-wrap{width:100%;}
    .survey-card .thumb-wrap .thumb,
    .survey-card .thumb-wrap .thumb-placeholder{width:100%;height:180px;}
  }
</style>
</head>
<body>

<canvas id="particles"></canvas>

<header>
  <div class="header-left">
    <div class="wordmark">SNAPPIC <span class="tag">WEBHOOK DASHBOARD</span></div>
    <div class="tagline" id="tagline">Insert coin. Receive webhook.</div>
  </div>


  <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">connecting…</span></div>
</header>

<main>
  <div class="stats" id="stats">
    <div class="stat-card">
      <div class="label">Total Events</div>
      <div class="value" id="statTotal">—</div>
    </div>
    <div class="stat-card accent-flash">
      <div class="label">Sessions Captured</div>
      <div class="value" id="statSessions">—</div>
      <div class="sub" id="statSessionsSub">&nbsp;</div>
    </div>
    <div class="stat-card accent-teal">
      <div class="label">Shares</div>
      <div class="value" id="statShares">—</div>
      <div class="sub" id="statSharesSub">&nbsp;</div>
    </div>
    <div class="stat-card accent-blue">
      <div class="label">Avg Survey Rating</div>
      <div class="value" id="statRating">—</div>
      <div class="sub" id="statRatingSub">&nbsp;</div>
    </div>
    <div class="stat-card accent-pulse">
      <div class="label">Prize Wins</div>
      <div class="value" id="statWins">—</div>
    </div>
  </div>

  <div class="filters" id="filtersBar">
    <div class="filter-group">
      <label class="filter-label" for="eventFilter">Event</label>
      <div class="filter-row">
        <select id="eventFilter" class="select">
          <option value="">All events</option>
        </select>
        <button class="icon-btn" id="renameEventBtn" type="button" title="Name this event">✎</button>
      </div>
    </div>
    <div class="filter-group">
      <label class="filter-label" for="deviceFilter">Device</label>
      <select id="deviceFilter" class="select">
        <option value="">All devices</option>
      </select>
    </div>
    <div class="filter-group" style="margin-left:auto;">
      <label class="filter-label">&nbsp;</label>
      <button class="btn" id="exportCsvBtn" style="display:none;" type="button">Export survey CSV</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-type="">All</button>
    <button class="tab" data-type="session">Sessions</button>
    <button class="tab" data-type="share">Shares</button>
    <button class="tab" data-type="survey">Surveys</button>
    <button class="tab" data-type="competition_win">Wins</button>
  </div>

  <div class="feed" id="feed">
    <div class="empty">Waiting for webhook events…</div>
  </div>
</main>

<canvas id="confettiCanvas"></canvas>

<div class="ticker">
  <div class="ticker-track" id="tickerTrack">Waiting for activity…</div>
</div>


<script>
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ---------- Starfield background (mouse parallax) ----------
(function initStarfield(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const COLORS = ['242,240,234', '245,197,24', '255,61,129', '79,209,197', '124,158,255'];
  const COUNT = reduceMotion ? 0 : 110;
  const stars = Array.from({length: COUNT}, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    r: Math.random() * 1.3 + 0.4,
    depth: Math.random() * 0.85 + 0.15,   // parallax strength: 0.15 (far) - 1.0 (near)
    drift: Math.random() * 0.05 + 0.01,   // slow upward drift, like distant stars scrolling by
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    baseAlpha: Math.random() * 0.5 + 0.15,
    twinkleSpeed: Math.random() * 0.02 + 0.006,
    twinklePhase: Math.random() * Math.PI * 2,
  }));

  const MAX_PARALLAX = 30; // px of max shift for the nearest stars
  let targetX = 0, targetY = 0;
  let offsetX = 0, offsetY = 0;

  if (!reduceMotion){
    window.addEventListener('mousemove', (e) => {
      targetX = ((e.clientX / window.innerWidth) * 2 - 1) * MAX_PARALLAX;
      targetY = ((e.clientY / window.innerHeight) * 2 - 1) * MAX_PARALLAX;
    });
  }

  function frame(t){
    offsetX += (targetX - offsetX) * 0.06;
    offsetY += (targetY - offsetY) * 0.06;

    ctx.clearRect(0, 0, w, h);
    for (const s of stars){
      s.y -= s.drift;
      if (s.y < -10) { s.y = h + 10; s.x = Math.random() * w; }

      const px = s.x + offsetX * s.depth;
      const py = s.y + offsetY * s.depth;

      const twinkle = (Math.sin(t * s.twinkleSpeed + s.twinklePhase) + 1) / 2;
      ctx.beginPath();
      ctx.arc(px, py, s.r * (0.7 + 0.4 * s.depth), 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${s.color}, ${(s.baseAlpha * (0.35 + 0.65 * twinkle)).toFixed(3)})`;
      ctx.fill();
    }
    if (!reduceMotion) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();

// ---------- Count-up number animation ----------
function animateValue(el, endValue, decimals){
  decimals = decimals || 0;
  if (reduceMotion){
    el.textContent = decimals ? endValue.toFixed(decimals) : endValue;
    return;
  }
  const startText = el.textContent.replace(/[^\d.-]/g, '');
  const startValue = startText === '' || isNaN(parseFloat(startText)) ? 0 : parseFloat(startText);
  if (startValue === endValue){
    el.textContent = decimals ? endValue.toFixed(decimals) : endValue;
    return;
  }
  const duration = 600;
  const startTime = performance.now();
  function step(now){
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const current = startValue + (endValue - startValue) * eased;
    el.textContent = decimals ? current.toFixed(decimals) : Math.round(current);
    if (progress < 1) requestAnimationFrame(step);
    else el.textContent = decimals ? endValue.toFixed(decimals) : endValue;
  }
  requestAnimationFrame(step);
}

// ---------- Live ticker ----------
const tickerTrack = document.getElementById('tickerTrack');
function updateTicker(){
  if (!events.length){
    tickerTrack.textContent = 'Waiting for activity…';
    return;
  }
  const recent = events.slice(0, 10);
  tickerTrack.innerHTML = recent.map(ev => {
    return `<span class="seg"><span class="badge-dot" style="background:var(--${badgeColorVar(ev.type)})"></span>${ev.type.replace('_',' ')} · ${escapeHtml(ev.summary || ev.session_id || '')}</span>`;
  }).join('');
  const textLen = tickerTrack.textContent.length;
  const duration = Math.max(14, Math.min(40, textLen * 0.13));
  tickerTrack.style.animation = 'none';
  void tickerTrack.offsetWidth; // force reflow to restart animation
  tickerTrack.style.animation = `ticker-scroll ${duration}s linear infinite`;
}
function badgeColorVar(type){
  return {session:'flash', share:'teal', survey:'blue', competition_win:'pulse'}[type] || 'muted';
}
function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

const feedEl = document.getElementById('feed');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
let currentFilter = '';
let currentEventFilter = '';
let currentDeviceFilter = '';
let events = [];
let eventOptions = [];

function matchesFilters(ev){
  if (currentFilter && ev.type !== currentFilter) return false;
  if (currentEventFilter && String(ev.event_id) !== currentEventFilter) return false;
  if (currentDeviceFilter && ev.device_name !== currentDeviceFilter) return false;
  return true;
}

function fmtTime(iso){
  const d = new Date(iso);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function renderFeed(){
  const filtered = events.filter(matchesFilters);
  const exportBtn = document.getElementById('exportCsvBtn');
  const isSurveyView = currentFilter === 'survey';
  exportBtn.style.display = isSurveyView ? 'inline-block' : 'none';

  if (filtered.length === 0){
    feedEl.className = isSurveyView ? 'survey-list' : 'feed';
    feedEl.innerHTML = '<div class="empty">No events yet for this filter.</div>';
    return;
  }
  if (isSurveyView){
    feedEl.className = 'survey-list';
    feedEl.innerHTML = filtered.map(e => surveyCardHTML(e, false)).join('');
  } else {
    feedEl.className = 'feed';
    feedEl.innerHTML = filtered.map(e => cardHTML(e, false)).join('');
  }
}

function cardHTML(ev, isNew){
  let thumb;
  if (!ev.direct_url) {
    thumb = `<div class="thumb-placeholder">no media</div>`;
  } else if (ev.session_type === 'video') {
    thumb = `<video class="thumb" src="${ev.direct_url}" controls preload="metadata" playsinline
                onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-placeholder',textContent:'media unavailable'}))"></video>`;
  } else {
    thumb = `<img class="thumb" src="${ev.direct_url}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-placeholder',textContent:'media unavailable'}))">`;
  }
  const metaBits = [fmtTime(ev.received_at), ev.session_id || 'n/a'];
  if (ev.device_name) metaBits.push(ev.device_name);
  return `
    <div class="card ${isNew ? 'new' : ''}" data-type="${ev.type}">
      <div class="flash-overlay"></div>
      ${thumb}
      <div class="body">
        <span class="badge ${ev.type}">${ev.type.replace('_',' ')}</span>
        <div class="summary">${ev.summary || ''}</div>
        <div class="time">${metaBits.join(' · ')}</div>
        ${ev.site_url ? `<div style="margin-top:6px;"><a class="site-link" href="${ev.site_url}" target="_blank" rel="noopener">view microsite →</a></div>` : ''}
      </div>
    </div>`;
}

function parseSurveyFields(ev){
  try {
    const payload = JSON.parse(ev.raw_json);
    const sections = ((payload.survey || {}).data_capture || {}).sections || [];
    return sections.flatMap(s => s.fields || []);
  } catch (e) {
    return [];
  }
}

function surveyCardHTML(ev, isNew){
  let thumb;
  if (!ev.direct_url) {
    thumb = `<div class="thumb-placeholder">no media</div>`;
  } else if (ev.session_type === 'video') {
    thumb = `<video class="thumb" src="${ev.direct_url}" controls preload="metadata" playsinline
                onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-placeholder',textContent:'media unavailable'}))"></video>`;
  } else {
    thumb = `<img class="thumb" src="${ev.direct_url}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'thumb-placeholder',textContent:'media unavailable'}))">`;
  }
  const fields = parseSurveyFields(ev);
  const rows = fields.length
    ? fields.map(f => `<tr><td class="field-title">${escapeHtml(f.field_title || '')}</td><td class="field-value">${escapeHtml(String(f.value ?? ''))}</td></tr>`).join('')
    : `<tr><td class="field-value" style="color:var(--muted);">No fields captured</td></tr>`;
  const metaBits = [fmtTime(ev.received_at), ev.session_id || 'n/a'];
  if (ev.device_name) metaBits.push(ev.device_name);
  if (ev.event_id !== null && ev.event_id !== undefined) metaBits.push(eventLabel(ev.event_id));
  return `
    <div class="survey-card ${isNew ? 'new' : ''}">
      <div class="thumb-wrap">${thumb}</div>
      <div class="content">
        <div class="meta-line">${metaBits.join(' · ')}</div>
        <table class="survey-fields">${rows}</table>
      </div>
    </div>`;
}

function eventLabel(eventId){
  const found = eventOptions.find(e => e.event_id === eventId);
  if (found && found.alias) return found.alias;
  return `Event ${eventId}`;
}

function prependEvent(ev){
  events.unshift(ev);
  updateTicker();
  refreshFilterOptions();

  if (ev.type === 'competition_win'){
    fireConfetti();
  }

  if (!matchesFilters(ev)) return;

  if (currentFilter === 'survey'){
    renderFeed();
    return;
  }

  const wrapper = document.createElement('div');
  wrapper.innerHTML = cardHTML(ev, true);
  const card = wrapper.firstElementChild;
  const emptyMsg = feedEl.querySelector('.empty');
  if (emptyMsg) feedEl.innerHTML = '';
  feedEl.prepend(card);
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = btn.dataset.type;
  renderFeed();
});

// ---------- Event / device filters ----------
const eventFilterEl = document.getElementById('eventFilter');
const deviceFilterEl = document.getElementById('deviceFilter');

async function populateFilters(){
  try {
    const res = await fetch('/api/filters');
    const data = await res.json();
    eventOptions = data.events || [];

    const prevEvent = eventFilterEl.value;
    eventFilterEl.innerHTML = '<option value="">All events</option>' + eventOptions.map(e =>
      `<option value="${e.event_id}">${escapeHtml(e.alias ? `${e.alias} (#${e.event_id})` : `Event ${e.event_id}`)} — ${e.count}</option>`
    ).join('');
    if (eventOptions.some(e => String(e.event_id) === prevEvent)) eventFilterEl.value = prevEvent;

    const prevDevice = deviceFilterEl.value;
    const devices = data.devices || [];
    deviceFilterEl.innerHTML = '<option value="">All devices</option>' + devices.map(d =>
      `<option value="${escapeHtml(d.device_name)}">${escapeHtml(d.device_name)} — ${d.count}</option>`
    ).join('');
    if (devices.some(d => d.device_name === prevDevice)) deviceFilterEl.value = prevDevice;
  } catch (e) {
    // filters are a nice-to-have; ignore transient failures
  }
}

let filterRefreshPending = false;
function refreshFilterOptions(){
  if (filterRefreshPending) return;
  filterRefreshPending = true;
  setTimeout(() => { filterRefreshPending = false; populateFilters(); }, 800);
}

eventFilterEl.addEventListener('change', () => {
  currentEventFilter = eventFilterEl.value;
  renderFeed();
});
deviceFilterEl.addEventListener('change', () => {
  currentDeviceFilter = deviceFilterEl.value;
  renderFeed();
});

document.getElementById('renameEventBtn').addEventListener('click', async () => {
  if (!eventFilterEl.value){
    alert('Pick a specific event first, then rename it.');
    return;
  }
  const eventId = parseInt(eventFilterEl.value, 10);
  const existing = eventOptions.find(e => e.event_id === eventId);
  const alias = prompt(`Name for event #${eventId}:`, existing && existing.alias ? existing.alias : '');
  if (alias === null) return; // cancelled
  await fetch('/api/event-alias', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({event_id: eventId, alias}),
  });
  await populateFilters();
  eventFilterEl.value = String(eventId);
  renderFeed();
});

document.getElementById('exportCsvBtn').addEventListener('click', () => {
  const params = new URLSearchParams();
  if (currentEventFilter) params.set('event_id', currentEventFilter);
  if (currentDeviceFilter) params.set('device_name', currentDeviceFilter);
  const qs = params.toString();
  window.location.href = '/api/export/surveys.csv' + (qs ? `?${qs}` : '');
});

// ---------- Confetti ----------
const confettiCanvas = document.getElementById('confettiCanvas');
const confettiCtx = confettiCanvas.getContext('2d');
function fireConfetti(){
  if (reduceMotion) return;
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;

  const COLORS = ['#f5c518', '#ff3d81', '#4fd1c5', '#7c9eff', '#f2f0ea'];
  const COUNT = 140;
  const pieces = Array.from({length: COUNT}, () => ({
    x: Math.random() * confettiCanvas.width,
    y: -20 - Math.random() * confettiCanvas.height * 0.4,
    w: Math.random() * 6 + 4,
    h: Math.random() * 10 + 6,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    vy: Math.random() * 2.5 + 2.5,
    vx: (Math.random() - 0.5) * 2.5,
    rotation: Math.random() * Math.PI * 2,
    rotationSpeed: (Math.random() - 0.5) * 0.25,
  }));

  const start = performance.now();
  const DURATION = 3200;

  function frame(t){
    const elapsed = t - start;
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    let anyVisible = false;
    for (const p of pieces){
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.045; // gravity
      p.rotation += p.rotationSpeed;
      if (p.y < confettiCanvas.height + 20) anyVisible = true;
      confettiCtx.save();
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate(p.rotation);
      confettiCtx.fillStyle = p.color;
      confettiCtx.globalAlpha = elapsed > DURATION - 500 ? Math.max(0, (DURATION - elapsed) / 500) : 1;
      confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      confettiCtx.restore();
    }
    if (elapsed < DURATION && anyVisible){
      requestAnimationFrame(frame);
    } else {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
  }
  requestAnimationFrame(frame);
}

async function loadEvents(){
  const res = await fetch('/api/events?limit=60');
  events = await res.json();
  renderFeed();
  updateTicker();
}

async function loadStats(){
  const res = await fetch('/api/stats');
  const s = await res.json();
  animateValue(document.getElementById('statTotal'), s.total);
  animateValue(document.getElementById('statSessions'), s.by_type.session || 0);
  const sessTypes = Object.entries(s.by_session_type || {}).map(([k,v]) => `${k}: ${v}`).join('  ·  ');
  document.getElementById('statSessionsSub').textContent = sessTypes || '\u00A0';
  animateValue(document.getElementById('statShares'), s.by_type.share || 0);
  const shareCh = Object.entries(s.share_channels || {}).map(([k,v]) => `${k}: ${v}`).join('  ·  ');
  document.getElementById('statSharesSub').textContent = shareCh || '\u00A0';
  const ratingEl = document.getElementById('statRating');
  if (s.avg_survey_rating !== null){
    animateValue(ratingEl, s.avg_survey_rating, 2);
  } else {
    ratingEl.textContent = '—';
  }
  document.getElementById('statRatingSub').textContent = `${s.survey_responses} response(s)`;
  animateValue(document.getElementById('statWins'), s.prize_wins);
}

function connectWS(){
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    statusDot.classList.add('live');
    statusText.textContent = 'live';
  };
  ws.onclose = () => {
    statusDot.classList.remove('live');
    statusText.textContent = 'reconnecting…';
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.kind === 'new_event'){
      prependEvent(data.event);
      loadStats();
    }
  };
}

const TAGLINES = [
  "Insert coin. Receive webhook.",
  "Catches chaos in real time.",
  "Webhooks in, chaos out.",
  "It just watches. That's the whole product.",
];
let taglineIndex = 0;
const taglineEl = document.getElementById('tagline');
setInterval(() => {
  taglineEl.classList.add('fade');
  setTimeout(() => {
    taglineIndex = (taglineIndex + 1) % TAGLINES.length;
    taglineEl.textContent = TAGLINES[taglineIndex];
    taglineEl.classList.remove('fade');
  }, 400);
}, 4000);

loadEvents();
loadStats();
populateFilters();
connectWS();
setInterval(loadStats, 30000);
setInterval(populateFilters, 30000);
</script>
